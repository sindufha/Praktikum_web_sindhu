<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Praktikum 4 - Border</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
    }
    h1 {
      border-bottom: 2px solid #333;
      padding-bottom: 8px;
    }
    .b-solid {
      border-color: black;
      border-style: solid;
      border-width: 5px;
      padding: 15px;
      margin-bottom: 15px;
    }
    .b-dashed {
      border: 3px dashed red;
      padding: 15px;
      margin-bottom: 15px;
    }
    .b-dotted {
      border: 4px dotted blue;
      padding: 15px;
      margin-bottom: 15px;
    }
    .b-double {
      border: 6px double green;
      padding: 15px;
      margin-bottom: 15px;
    }
    .b-groove {
      border: 6px groove purple;
      padding: 15px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <h1>Praktikum 4 - Border</h1>

  <p>Property <b>border</b> butuh tiga nilai utama: <code>color</code>, <code>style</code>, dan <code>width</code>.</p>

  <div class="b-solid">Border solid hitam 5px</div>
  <div class="b-dashed">Border dashed merah 3px</div>
  <div class="b-dotted">Border dotted biru 4px</div>
  <div class="b-double">Border double hijau 6px</div>
  <div class="b-groove">Border groove ungu 6px</div>
</body>
</html>
