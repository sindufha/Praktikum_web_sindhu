<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Praktikum 3 - Padding</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
    }
    h1 {
      border-bottom: 2px solid #333;
      padding-bottom: 8px;
    }
    .kotak-individual {
      background-color: orange;
      color: black;
      width: 200px;
      border: 2px solid #333;
      padding-top: 50px;
      padding-right: 30px;
      padding-bottom: 50px;
      padding-left: 80px;
      margin-bottom: 20px;
    }
    .kotak-shorthand {
      background-color: lightblue;
      width: 200px;
      border: 2px solid #333;
      padding: 20px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <h1>Praktikum 3 - Padding</h1>

  <p>Property <b>padding</b> digunakan untuk memberi jarak antara isi elemen dengan border.</p>

  <h3>Padding Individual Sides</h3>
  <div class="kotak-individual">
    padding-top: 50px<br>
    padding-right: 30px<br>
    padding-bottom: 50px<br>
    padding-left: 80px
  </div>

  <h3>Padding Shorthand</h3>
  <div class="kotak-shorthand">
    padding: 20px (semua sisi)
  </div>
</body>
</html>
