<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Praktikum 2 - Margin</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
    }
    h1 {
      border-bottom: 2px solid #333;
      padding-bottom: 8px;
    }
    .box {
      background-color: green;
      color: yellow;
      width: 100px;
      height: 100px;
      margin-bottom: 50px;
      padding: 10px;
    }
    .box-empat-sisi {
      background-color: navy;
      color: white;
      width: 150px;
      height: 80px;
      margin-top: 20px;
      margin-right: 30px;
      margin-bottom: 50px;
      margin-left: 40px;
      padding: 10px;
    }
  </style>
</head>
<body>
  <h1>Praktikum 2 - Margin</h1>

  <p>Property <b>margin</b> digunakan untuk memberi jarak antar elemen.</p>

  <div class="box">Box ke satu</div>
  <div class="box">Box ke dua</div>

  <h3>Margin pada 4 sisi</h3>
  <div class="box-empat-sisi">
    margin-top: 20px<br>
    margin-right: 30px<br>
    margin-bottom: 50px<br>
    margin-left: 40px
  </div>
</body>
</html>
